<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sender fixture - configured and disabled</title>
<!-- The sender is initialized with transmission disabled. -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');
fbq('consent', 'revoke');
fbq('init', '30002531562469');
fbq('track', 'PageView');
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 40px; line-height: 1.5; }
  #panel { position: fixed; bottom: 0; left: 0; right: 0; background: #222; color: #fff;
           padding: 20px; display: flex; justify-content: space-between; align-items: center; }
  #panel button { margin-left: 10px; padding: 8px 16px; cursor: pointer; }
</style>
</head>
<body>
<h1>Properly configured, sender disabled</h1>
<p>This page initializes the optional sender with transmission disabled. It remains disabled unless enabled below.</p>
<div id="panel">
  <span>Optional senders are available.</span>
  <span>
    <button onclick="keepSenderDisabled()">Keep disabled</button>
    <button onclick="enableSender()">Enable</button>
  </span>
</div>
<script>
function enableSender() {
  document.getElementById('panel').remove();
  fbq('consent', 'grant');
}
function keepSenderDisabled() {
  document.getElementById('panel').remove();
}
</script>
</body>
</html>
